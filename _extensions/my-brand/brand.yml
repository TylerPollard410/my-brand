meta:
  name: 
    full: Tyler Pollard
    short: TP
  description: "Statistician and operations research analyst focused on Bayesian modeling, predictive analytics, and data visualization."
  link:
    home: https://tylerpollard410.github.io
    github: https://github.com/TylerPollard410
    linkedin: https://www.linkedin.com/in/tyler-pollard-763b8315b/
    email: mailto:tylerpollard410@gmail.com

logo:
  # Shared assets for Quarto + Bootstrap/Shiny projects.
  images:
    icon:
      path: logos/tyler-pollard-icon.png
      alt: "Tyler Pollard icon"
    header-logo:
      path: logos/tyler-pollard-header-logo.png
      alt: "Tyler Pollard"
    header-logo-dark:
      path: logos/tyler-pollard-header-logo-dark.png
      alt: "Tyler Pollard dark"
    header-logo-light:
      path: logos/tyler-pollard-header-logo-light.png
      alt: "Tyler Pollard light"
  small: icon
  medium: header-logo
    # light: header-logo-on-light
    # dark: header-logo-on-dark
  large: header-logo
    # If you add dedicated variants later:
    # dark: header-logo-on-dark
    # light: header-logo-on-light

color:
  palette:
    # Retro core
    tp-purple: "#6B2EFF"
    tp-pink: "#FF5BC8"
    tp-teal: "#00E5D4"
    tp-cyan: "#03c7e8"
    tp-green: "#6fff00"
    tp-orange: "#FF7A1A"
    tp-orange-dark: "#cc6214"
    tp-yellow: "#FFC857"
    tp-yellow-dark: "#cca046"

    blue:    "#0d6efd"
    indigo:  "#6610f2"
    purple:  tp-purple
    pink:    tp-pink
    red:     "#dc3545"
    orange:  tp-orange
    yellow:  tp-yellow
    green:   tp-green
    teal:    tp-teal
    cyan:    "#0dcaf0"

    # Grays
    white:    "#fff"
    gray-100: "#f8f9fa"
    gray-200: "#e9ecef"
    gray-300: "#dee2e6"
    gray-400: "#ced4da"
    gray-500: "#adb5bd"
    gray-600: "#6c757d"
    gray-700: "#495057"
    gray-800: "#343a40"
    gray-900: "#212529"
    black:    "#000"

  # Mode-specific semantic roles
  background:
    light: "#f0f0f0"
    dark: "#121212"
  foreground:
    light: "#222222"
    dark: "#f2f2f2"

  primary: purple
  # secondary: cyan
  # tertiary:
  #   light: gray-200
  #   dark: gray-700

  success: green
  info: cyan
  warning: yellow
  danger: pink
  light: white
  dark: gray-800

typography:
  fonts:
    # Primary brand font (retro-modern, excellent numerals)
    - family: Space Grotesk
      source: google
      weight: [400, 500, 600, 700]
      style: [normal]

    # Monospace for code, stats, tables
    - family: JetBrains Mono
      source: google
      weight: [400, 600]
      style: [normal, italic]

  base:
    family: Space Grotesk
    weight: 400
    size: 1rem
    line-height: 1.5
    # color intentionally inherited from the active Bootstrap theme

  headings:
    family: Space Grotesk
    weight: 600
    line-height: 1.2
    color: danger

  monospace:
    family: JetBrains Mono
    weight: 400
    size: 0.9em

  monospace-inline:
    weight: 400
    color:
      light: orange
      dark: orange
    background-color: 
      light: gray-300 # rgba(var(--bs-dark-rgb), 0.1)
      dark: gray-800 # rgba(var(--bs-light-rgb), 0.1)

  monospace-block:
    color: orange
    background-color: 
      light: gray-300 # rgba(var(--bs-dark-rgb), 0.1) #0.1
      dark: gray-800 # rgba(var(--bs-light-rgb), 0.1) #0.14
    line-height: 1.4

  link:
    weight: 600
    color: 
      light: primary # tp-yellow-dark
      dark: warning
    #decoration: underline

defaults:
  bootstrap:
    # Bootstrap 5 placeholders (safe to keep empty until needed)
    defaults:
      version: 5
    rules: |
      /* Global navbar logo sizing (applies to Quarto + bslib Bootstrap navbars) */
      .navbar-brand .navbar-logo,
      .navbar-brand img {
        max-height: 48px;
        width: auto;
      }
    # functions: ""
    # mixins: ""
  quarto:
    format:
      # Quarto format placeholders (keep allowed formats only)
      html:
        title-block-banner: "var(--bs-cyan)"
        title-block-banner-color: "var(--bs-black)"
      # dashboard: {}
      # revealjs: {}
      # typst:
        # papersize: us-letter
  shiny:
    # Shiny/bslib placeholders
    theme:
      preset: bootstrap
      version: 5
      #defaults:
        #bslib-dashboard-design: false
      #rules: |
      #  .navbar-brand { color: $brand-pink }
