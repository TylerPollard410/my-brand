meta:
  name:
    full: Tyler Pollard
    short: TP
  description: Statistician and operations research analyst focused on Bayesian
    modeling, predictive analytics, and data visualization.
  link:
    home: https://tylerpollard410.github.io
    github: https://github.com/TylerPollard410
    linkedin: https://www.linkedin.com/in/tyler-pollard-763b8315b/
    email: mailto:tylerpollard410@gmail.com

logo:
  images:
    icon:
      path: logos/tyler-pollard-icon.png
      alt: Tyler Pollard icon
    header-logo:
      path: logos/tyler-pollard-header-logo.png
      alt: Tyler Pollard
    header-logo-dark:
      path: logos/tyler-pollard-header-logo-dark.png
      alt: Tyler Pollard dark
    header-logo-light:
      path: logos/tyler-pollard-header-logo-light.png
      alt: Tyler Pollard light
  small: icon
  medium: header-logo
  large: header-logo

color:
  palette:
    tp-white: "#f2f2f2"
    tp-black: "#121212"
    tp-light-bg: "#f0f0f0"
    tp-light-fg: "#222222"
    tp-dark-bg: "#121212"
    tp-dark-fg: "#f2f2f2"
    tp-purple: "#6B2EFF"
    tp-purple-dark: "#4F1FCC"
    tp-pink: "#FF5BC8"
    tp-pink-dark: "#DF41AC" #"#BE2F93"
    tp-teal: "#00E5D4"
    tp-teal-dark: "#0EBFB1" #"#0A7A73"
    tp-cyan: "#03c7e8"
    tp-cyan-dark: "#04A7C3" #"#0B6E80"
    tp-green: "#6fff00"
    tp-green-dark: "#5CD503" #"#227A00"
    tp-orange: "#FF7A1A"
    tp-orange-dark: "#D46824" #"#A94E10"
    tp-yellow: "#FFC857"
    tp-yellow-dark: "#CD9B02" #'#8A5A00'
    default: tp-cyan
    blue: tp-cyan #"#0d6efd"
    indigo: "#6610f2"
    purple: tp-purple
    pink: tp-pink
    red: "#dc3545"
    orange: tp-orange
    yellow: tp-yellow
    green: tp-green
    teal: tp-teal
    cyan: tp-cyan
    white: tp-white # "#fff"
    # gray-100: "#f8f9fa"
    # gray-200: "#e9ecef"
    # gray-300: "#dee2e6"
    # gray-400: "#ced4da"
    # gray-500: "#adb5bd"
    # gray-600: "#6c757d"
    # gray-700: "#495057"
    # gray-800: "#343a40"
    # gray-900: "#212529"
    black: tp-black #"#000"
  background:
    # white
    light: white
    dark: black
  foreground:
    # black
    light: black
    dark: white
  primary: purple
  # secondary:
  # light: gray-600
  # dark: gray-500
  # tertiary:
  # light: gray-200
  # dark: gray-800
  success:
    # green
    light: tp-green-dark
    dark: green
  info:
    # cyan
    light: tp-cyan-dark
    dark: cyan
  warning:
    # yellow
    light: tp-yellow-dark
    dark: yellow
  danger:
    # pink
    light: tp-pink-dark
    dark: pink
  # light: tp-dark-fg
  # dark: tp-dark-bg

typography:
  fonts:
    - family: Space Grotesk
      source: google
      weight:
        - 400
        - 500
        - 600
        - 700
      style: normal
    - family: JetBrains Mono
      source: google
      weight:
        - 400
        - 600
      style:
        - normal
        - italic
  base:
    family: Space Grotesk
    weight: 400
    size: 1rem
    line-height: 1.5
  headings:
    family: Space Grotesk
    weight: 600
    line-height: 1.2
    color:
      # pink-dark
      light: tp-pink-dark
      dark: pink
  monospace:
    family: JetBrains Mono
    weight: 400
    size: 0.9em
  monospace-inline:
    weight: 400
    color:
      # orange
      light: tp-orange-dark
      dark: orange
    # background-color:
    #   light: gray-200
    #   dark: gray-900
  monospace-block:
    color:
      # orange
      light: tp-orange-dark
      dark: orange
    # background-color:
    #   light: gray-200
    #   dark: gray-900
    line-height: 1.4
  link:
    weight: 600
    color:
      # warning
      light: tp-yellow-dark
      dark: yellow
    decoration: underline

defaults:
  bootstrap:
    defaults:
      version: 5
      enable-gradients: true
      enable-shadows: true
      navbar-bg: $brand-purple
      min-contrast-ratio: 1.5

      # primary-text-emphasis-dark: tint-color($primary, 40%)
      # secondary-text-emphasis-dark: tint-color($secondary, 40%)
      # success-text-emphasis-dark: tint-color($success, 40%)
      # info-text-emphasis-dark: tint-color($info, 40%)
      # warning-text-emphasis-dark: tint-color($warning, 40%)
      # danger-text-emphasis-dark: tint-color($danger, 40%)

      # primary-bg-subtle-dark: shade-color($primary, 80%)
      # secondary-bg-subtle-dark: shade-color($secondary, 80%)
      # success-bg-subtle-dark: shade-color($success, 80%)
      # info-bg-subtle-dark: shade-color($info, 80%)
      # warning-bg-subtle-dark: shade-color($warning, 80%)
      # danger-bg-subtle-dark: shade-color($danger, 80%)

      # primary-border-subtle-dark: shade-color($primary, 40%)
      # secondary-border-subtle-dark: shade-color($secondary, 40%)
      # success-border-subtle-dark: shade-color($success, 40%)
      # info-border-subtle-dark: shade-color($info, 40%)
      # warning-border-subtle-dark: shade-color($warning, 40%)
      # danger-border-subtle-dark: shade-color($danger, 40%)

      # link-color-dark: tint-color($warning, 40%)
      # link-hover-color-dark: shift-color($link-color-dark, -$link-shade-percentage)

      # code-color-dark: tint-color($code-color, 40%)
      # mark-color-dark: $body-color-dark
      # mark-bg-dark: $yellow
    rules: |
      /* Global navbar logo sizing (applies to Quarto + bslib Bootstrap navbars) */
      .navbar-brand .navbar-logo,
      .navbar-brand img {
        max-height: 48px;
        width: auto;
      }
  quarto:
    format:
      html:
        title-block-banner: var(--bs-cyan)
        title-block-banner-color: var(--bs-black)
  shiny:
    theme:
      preset: shiny
      version: 5
      defaults:
        headings-color-dark: $brand-tp-pink-dark
        link-color: $brand-tp-yellow-dark
        link-color-dark: $brand-tp-yellow
