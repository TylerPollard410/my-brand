meta:
  name:
    full: Tyler Pollard
    short: TP
  description:
    Statistician and operations research analyst focused on Bayesian modeling,
    predictive analytics, and data visualization.
  link:
    home: https://tylerpollard410.github.io
    github: https://github.com/TylerPollard410
    linkedin: https://www.linkedin.com/in/tyler-pollard-763b8315b/
    email: mailto:tylerpollard410@gmail.com
logo:
  images:
    icon:
      path: logos/tyler-pollard-icon.png
      alt: Tyler Pollard icon
    header-logo:
      path: logos/tyler-pollard-header-logo.png
      alt: Tyler Pollard
    header-logo-dark:
      path: logos/tyler-pollard-header-logo-dark.png
      alt: Tyler Pollard dark
    header-logo-light:
      path: logos/tyler-pollard-header-logo-light.png
      alt: Tyler Pollard light
  small: icon
  medium: header-logo
  large: header-logo
color:
  palette:
    tp-white: "#f2f2f2"
    tp-black: "#121212"
    tp-light-bg: "#f0f0f0"
    tp-light-fg: "#222222"
    tp-dark-bg: "#121212"
    tp-dark-fg: "#f2f2f2"
    tp-purple: "#6B2EFF"
    tp-purple-dark: "#4F1FCC"
    tp-pink: "#FF5BC8"
    tp-pink-dark: "#DF41AC"
    tp-teal: "#00E5D4"
    tp-teal-dark: "#0EBFB1"
    tp-cyan: "#03c7e8"
    tp-cyan-dark: "#04A7C3"
    tp-green: "#6fff00"
    tp-green-dark: "#5CD503"
    tp-orange: "#FF7A1A"
    tp-orange-dark: "#D46824"
    tp-yellow: "#FFC857"
    tp-yellow-dark: "#CD9B02"
    default: tp-cyan
    blue: tp-cyan
    indigo: "#6610f2"
    purple: tp-purple
    pink: tp-pink
    red: "#dc3545"
    orange: tp-orange
    yellow: tp-yellow
    green: tp-green
    teal: tp-teal
    cyan: tp-cyan
    white: tp-white
    black: tp-black
  background: white
  foreground: black
  primary: purple
  success: tp-green-dark
  info: tp-cyan-dark
  warning: tp-yellow-dark
  danger: tp-pink-dark
typography:
  fonts:
    - family: Space Grotesk
      source: google
      weight:
        - 400
        - 500
        - 600
        - 700
      style: normal
    - family: JetBrains Mono
      source: google
      weight:
        - 400
        - 600
      style:
        - normal
        - italic
  base:
    family: Space Grotesk
    weight: 400
    size: 1rem
    line-height: 1.5
  headings:
    family: Space Grotesk
    weight: 600
    line-height: 1.2
    color: tp-pink-dark
  monospace:
    family: JetBrains Mono
    weight: 400
    size: 0.9em
  monospace-inline:
    weight: 400
    color: tp-orange-dark
  monospace-block:
    color: tp-orange-dark
    line-height: 1.4
  link:
    weight: 600
    color: tp-yellow-dark
    decoration: underline
defaults:
  bootstrap:
    defaults:
      version: 5
      enable-gradients: yes
      enable-shadows: yes
      navbar-bg: $brand-purple
      min-contrast-ratio: 1.5
    rules: |
      /* Global navbar logo sizing (applies to Quarto + bslib Bootstrap navbars) */
      .navbar-brand .navbar-logo,
      .navbar-brand img {
        max-height: 48px;
        width: auto;
      }
  quarto:
    format:
      html:
        title-block-banner: var(--bs-cyan)
        title-block-banner-color: var(--bs-black)
  shiny:
    theme:
      preset: shiny
      version: 5
      defaults:
        headings-color-dark: $brand-tp-pink-dark
        link-color: $brand-tp-yellow-dark
        link-color-dark: $brand-tp-yellow
